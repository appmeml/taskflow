<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1C1A16"/>
      <stop offset="50%" stop-color="#080706"/>
      <stop offset="100%" stop-color="#181410"/>
    </linearGradient>
    <linearGradient id="gld" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#F0D48A"/>
      <stop offset="40%"  stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#7A5A18"/>
    </linearGradient>
    <linearGradient id="gld2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#E8C87A"/>
      <stop offset="100%" stop-color="#9A7020"/>
    </linearGradient>
    <!-- Marble vein effect -->
    <filter id="marble">
      <feTurbulence type="fractalNoise" baseFrequency="0.015 0.04" numOctaves="4" seed="8" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
      <feBlend in="SourceGraphic" in2="gray" mode="soft-light" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- Outer frame / shadow -->
  <rect x="8" y="12" width="496" height="496" rx="72" fill="#000" opacity=".5"/>

  <!-- Main background -->
  <rect width="512" height="512" fill="url(#bg)" rx="72"/>

  <!-- Marble texture overlay -->
  <rect width="512" height="512" rx="72" fill="url(#bg)" filter="url(#marble)" opacity=".35"/>

  <!-- Inner gold border frame -->
  <rect x="18" y="18" width="476" height="476" rx="56" fill="none"
        stroke="url(#gld)" stroke-width="1.5" opacity=".45"/>
  <rect x="28" y="28" width="456" height="456" rx="48" fill="none"
        stroke="url(#gld)" stroke-width=".8" opacity=".2"/>

  <!-- ── T letter ── -->
  <!-- Top horizontal bar -->
  <rect x="72"  y="148" width="176" height="38" rx="6" fill="url(#gld)"/>
  <!-- Vertical stem -->
  <rect x="132" y="148" width="56"  height="216" rx="6" fill="url(#gld2)"/>

  <!-- ── F letter (overlapping T slightly) ── -->
  <!-- Vertical stem -->
  <rect x="268" y="148" width="56"  height="216" rx="6" fill="url(#gld)"/>
  <!-- Top horizontal bar -->
  <rect x="268" y="148" width="172" height="38" rx="6" fill="url(#gld2)"/>
  <!-- Middle bar -->
  <rect x="268" y="232" width="124" height="32" rx="6" fill="url(#gld)"/>

  <!-- Corner diamond accents -->
  <polygon points="256,480 264,492 256,504 248,492" fill="url(#gld)" opacity=".7"/>
</svg>
