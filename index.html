<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow · Gestor de tareas</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Pantalla de autenticación -->
  <div id="auth-container">
    <div class="auth-box">
      <div class="auth-heading">
        <h1>Iniciar sesión</h1>
        <p>Organiza tus tareas en tableros Kanban</p>
      </div>

      <form id="auth-form">
        <div class="form-group" id="name-field">
          <label for="name">Nombre</label>
          <input type="text" id="name" placeholder="Tu nombre" />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="tu@email.com" required />
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input
            type="password"
            id="password"
            placeholder="••••••••"
            required
          />
        </div>

        <button type="submit">Iniciar sesión</button>
      </form>

      <div class="auth-toggle" id="toggle-mode">
        ¿No tienes cuenta? <a href="#">Regístrate aquí</a>
      </div>
    </div>
  </div>

  <!-- Pantalla de tableros (app principal) -->
  <div id="app-container">
    <div class="navbar">
      <span class="navbar-brand">TaskFlow</span>
      <div class="navbar-right">
        <span class="user-email" id="user-email"></span>
        <button class="navbar-btn" id="settings-btn" title="Configuración">⚙️</button>
        <button class="logout-btn" id="logout-btn">Salir</button>
      </div>
    </div>

    <!-- Panel de settings -->
    <div id="settings-panel" class="settings-panel" style="display: none;">
      <div class="settings-header">
        <h2>Configuración</h2>
        <button id="close-settings" class="modal-close">✕</button>
      </div>
      <div class="settings-content"></div>
    </div>

    <div class="boards-header">
      <h2>Tus tableros</h2>
      <p>Haz clic en un tablero para abrir, o crea uno nuevo.</p>
    </div>

    <div id="boards-container"></div>
  </div>

  <!-- Firebase SDK (desde CDN, sin dependencias) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js"></script>

  <!-- Nuestros scripts -->
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/boards.js"></script>
</body>
</html>
