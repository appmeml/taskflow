<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow · Gestor de tareas</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #333;
    }
    .hidden {
      display: none !important;
    }
    #auth-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .auth-box {
      background: white;
      border-radius: 12px;
      padding: 40px;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    }
    .auth-heading h1 {
      font-size: 28px;
      margin-bottom: 8px;
      color: #333;
    }
    .auth-heading p {
      color: #666;
      font-size: 14px;
      margin-bottom: 24px;
    }
    .form-group {
      margin-bottom: 16px;
      display: none;
    }
    .form-group.active {
      display: block;
    }
    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #333;
    }
    .form-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }
    .form-group input:focus {
      outline: none;
      border-color: #667eea;
    }
    #auth-form button {
      width: 100%;
      padding: 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
    }
    #auth-form button:hover {
      background: #5568d3;
    }
    .auth-toggle {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #666;
    }
    .auth-toggle a {
      color: #667eea;
      cursor: pointer;
      text-decoration: none;
      font-weight: 600;
    }
    #app-container {
      display: none;
    }
    .navbar {
      background: white;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #eee;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }
    .navbar-brand {
      font-size: 20px;
      font-weight: 700;
      color: #667eea;
    }
    .navbar-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .logout-btn {
      padding: 8px 16px;
      background: #ff6b6b;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }
    .main-content {
      padding: 32px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .boards-header h2 {
      font-size: 24px;
      margin-bottom: 8px;
    }
    .boards-header p {
      color: #666;
      margin-bottom: 24px;
    }
    #boards-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 16px;
    }
    .board-card {
      padding: 20px;
      border-radius: 8px;
      color: white;
      transition: transform 0.2s;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }
    .board-card:hover {
      transform: translateY(-4px);
    }
    .board-card h3 {
      font-size: 18px;
      margin-bottom: 16px;
    }
    .board-actions {
      display: flex;
      gap: 8px;
    }
    .btn-sm {
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.3);
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }
    .board-create {
      padding: 24px;
      border: 2px dashed #ddd;
      border-radius: 8px;
      text-align: center;
    }
    .board-create h3 {
      margin-bottom: 16px;
      color: #333;
    }
    .board-create input {
      padding: 10px;
      margin: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
    }
    .board-create button {
      padding: 10px 20px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
    }
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 16px 24px;
      background: #333;
      color: white;
      border-radius: 8px;
      font-size: 14px;
      z-index: 9999;
      animation: slideIn 0.3s ease-out;
    }
    .toast-success {
      background: #4caf50;
    }
    .toast-error {
      background: #f44336;
    }
    @keyframes slideIn {
      from {
        transform: translateX(400px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
    .empty-state {
      text-align: center;
      padding: 40px;
      color: #666;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div id="auth-container">
    <div class="auth-box">
      <div class="auth-heading">
        <h1 id="auth-title">Iniciar sesión</h1>
        <p>Organiza tus tareas en tableros Kanban</p>
      </div>
      <form id="auth-form">
        <div class="form-group active">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="tu@email.com" required />
        </div>
        <div class="form-group active">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="••••••••" required />
        </div>
        <div class="form-group" id="name-group">
          <label for="name">Nombre</label>
          <input type="text" id="name" placeholder="Tu nombre" />
        </div>
        <button type="submit" id="auth-btn">Iniciar sesión</button>
      </form>
      <div class="auth-toggle" id="toggle-mode">
        ¿No tienes cuenta? <a href="#">Regístrate aquí</a>
      </div>
    </div>
  </div>

  <div id="app-container" class="hidden">
    <div class="navbar">
      <span class="navbar-brand">TaskFlow</span>
      <div class="navbar-right">
        <span id="user-email" style="color: #666; font-size: 14px;"></span>
        <button class="logout-btn" id="logout-btn">Salir</button>
      </div>
    </div>
    <div class="main-content">
      <div class="boards-header">
        <h2>Tus tableros</h2>
        <p>Haz clic en un tablero para abrir, o crea uno nuevo.</p>
      </div>
      <div id="boards-container"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBjRj5Ba8HQiqb6W4UBAVDGMgVLhidvGsk",
      authDomain: "taskflow-ec.firebaseapp.com",
      projectId: "taskflow-ec",
      storageBucket: "taskflow-ec.firebasestorage.app",
      messagingSenderId: "175224756577",
      appId: "1:175224756577:web:3fef747dcae223c934cd20"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let isRegisterMode = false;

    function showToast(msg, type = 'success') {
      const t = document.createElement('div');
      t.className = `toast toast-${type}`;
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }

    const authForm = document.getElementById('auth-form');
    const toggleBtn = document.getElementById('toggle-mode');
    const authTitle = document.getElementById('auth-title');
    const authBtn = document.getElementById('auth-btn');
    const nameGroup = document.getElementById('name-group');
    const logoutBtn = document.getElementById('logout-btn');
    const userEmail = document.getElementById('user-email');
    const authContainer = document.getElementById('auth-container');
    const appContainer = document.getElementById('app-container');
    const boardsContainer = document.getElementById('boards-container');

    toggleBtn.addEventListener('click', (e) => {
      e.preventDefault();
      isRegisterMode = !isRegisterMode;
      if (isRegisterMode) {
        authTitle.textContent = 'Crear cuenta';
        authBtn.textContent = 'Crear cuenta';
        nameGroup.classList.add('active');
        toggleBtn.innerHTML = '¿Ya tienes cuenta? <a href="#">Inicia sesión aquí</a>';
      } else {
        authTitle.textContent = 'Iniciar sesión';
        authBtn.textContent = 'Iniciar sesión';
        nameGroup.classList.remove('active');
        toggleBtn.innerHTML = '¿No tienes cuenta? <a href="#">Regístrate aquí</a>';
      }
    });

    authForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const name = document.getElementById('name').value.trim();

      if (!email || !password) {
        showToast('Llena todos los campos', 'error');
        return;
      }

      try {
        if (isRegisterMode) {
          if (!name) {
            showToast('Ingresa tu nombre', 'error');
            return;
          }
          await auth.createUserWithEmailAndPassword(email, password);
          await db.collection('users').doc(auth.currentUser.uid).set({
            email: email,
            name: name,
            createdAt: new Date()
          });
          showToast('✅ Cuenta creada');
          authForm.reset();
          isRegisterMode = false;
          authTitle.textContent = 'Iniciar sesión';
          authBtn.textContent = 'Iniciar sesión';
          nameGroup.classList.remove('active');
          toggleBtn.innerHTML = '¿No tienes cuenta? <a href="#">Regístrate aquí</a>';
        } else {
          await auth.signInWithEmailAndPassword(email, password);
          showToast('✅ Sesión iniciada');
          authForm.reset();
        }
      } catch (err) {
        showToast(err.message, 'error');
      }
    });

    logoutBtn.addEventListener('click', async () => {
      try {
        await auth.signOut();
        showToast('Sesión cerrada');
      } catch (err) {
        showToast(err.message, 'error');
      }
    });

    async function loadBoards() {
      if (!currentUser) return;
      try {
        boardsContainer.innerHTML = '';
        const snap = await db.collection('users').doc(currentUser.uid).collection('boards').get();
        if (snap.empty) {
          boardsContainer.innerHTML = '<p class="empty-state">No hay tableros</p>';
        } else {
          snap.forEach(doc => {
            const board = doc.data();
            const card = document.createElement('div');
            card.className = 'board-card';
            card.style.backgroundColor = board.background || '#0079bf';
            card.innerHTML = `
              <h3>${board.title}</h3>
              <div class="board-actions">
                <button class="btn-sm" onclick="openBoard('${doc.id}')">Abrir</button>
                <button class="btn-sm" onclick="deleteBoard('${doc.id}')">Eliminar</button>
              </div>
            `;
            boardsContainer.appendChild(card);
          });
        }
        const form = document.createElement('div');
        form.className = 'board-create';
        form.innerHTML = `
          <h3>+ Crear nuevo tablero</h3>
          <input type="text" id="new-board-name" placeholder="Nombre" />
          <input type="color" id="new-board-color" value="#0079bf" />
          <button onclick="createBoard()">Crear</button>
        `;
        boardsContainer.appendChild(form);
      } catch (err) {
        showToast('Error cargando tableros', 'error');
      }
    }

    window.createBoard = async () => {
      const name = document.getElementById('new-board-name').value.trim();
      const color = document.getElementById('new-board-color').value;
      if (!name) {
        showToast('Ingresa un nombre', 'error');
        return;
      }
      try {
        await db.collection('users').doc(currentUser.uid).collection('boards').add({
          title: name,
          background: color,
          createdAt: new Date()
        });
        showToast('✅ Tablero creado');
        loadBoards();
      } catch (err) {
        showToast(err.message, 'error');
      }
    };

    window.openBoard = (id) => {
      localStorage.setItem('selectedBoardId', id);
      localStorage.setItem('selectedUserId', currentUser.uid);
      window.location.href = 'board.html';
    };

    window.deleteBoard = async (id) => {
      if (!confirm('¿Eliminar?')) return;
      try {
        await db.collection('users').doc(currentUser.uid).collection('boards').doc(id).delete();
        showToast('✅ Eliminado');
        loadBoards();
      } catch (err) {
        showToast(err.message, 'error');
      }
    };

    auth.onAuthStateChanged((user) => {
      currentUser = user;
      if (user) {
        authContainer.classList.add('hidden');
        appContainer.classList.remove('hidden');
        userEmail.textContent = user.email;
        loadBoards();
      } else {
        authContainer.classList.remove('hidden');
        appContainer.classList.add('hidden');
      }
    });
  </script>
</body>
</html>
